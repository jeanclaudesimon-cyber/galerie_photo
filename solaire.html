
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☀️ Suivi Solaire — Saint-Léger</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --sun:#FFB800;--sun2:#FF7A00;--green:#00E5A0;--blue:#00AAFF;--red:#FF4444;
  --bg:#0A1628;--glass:rgba(255,255,255,0.05);--border:rgba(255,184,0,0.18);
  --text:#fff;--text2:rgba(255,255,255,0.6);--text3:rgba(255,255,255,0.45);
  --card-bg:rgba(255,255,255,0.05);--card-border:rgba(255,184,0,0.18);
  --tick:rgba(255,255,255,0.38);--grid-c:rgba(255,255,255,0.05);
}
.light{
  --bg:#F5F7FA;--glass:rgba(255,255,255,0.98);--border:rgba(180,120,0,0.25);
  --text:#0D1B2A;--text2:#3A4A5C;--text3:#6B7A8D;
  --card-bg:#FFFFFF;--card-border:rgba(180,120,0,0.2);
  --tick:rgba(13,27,42,0.55);--grid-c:rgba(0,0,0,0.07);
  --sun:#B86A00;--sun2:#8C3D00;
  --green:#006B3A;--red:#C0001A;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;transition:background.3s,color.3s;}
body:not(.light)::before{content:'';position:fixed;top:-40%;left:-20%;width:80vw;height:80vw;background:radial-gradient(circle,rgba(255,184,0,0.07) 0%,transparent 65%);pointer-events:none;animation:pulse 8s ease-in-out infinite;}
body:not(.light)::after{content:'';position:fixed;bottom:-30%;right:-20%;width:60vw;height:60vw;background:radial-gradient(circle,rgba(0,170,255,0.06) 0%,transparent 65%);pointer-events:none;animation:pulse 10s ease-in-out 2s infinite reverse;}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
@keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
header{padding:1.1rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.7rem;position:relative;z-index:10;background:var(--glass);backdrop-filter:blur(10px);}
.logo{display:flex;align-items:center;gap:.85rem;}
.sun-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--sun),var(--sun2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.25rem;box-shadow:0 0 18px rgba(255,184,0,0.4);animation:spin-slow 20s linear infinite;flex-shrink:0;}
.logo-text h1{font-size:1.15rem;font-weight:800;background:linear-gradient(90deg,var(--sun),var(--text));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;}
.logo-text p{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--text3);margin-top:2px;}
.header-right{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
.update-info{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--text3);text-align:right;line-height:1.4;}
.btn-icon{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--glass);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all.2s;}
.btn-icon:hover{border-color:var(--sun);color:var(--sun);}
.year-row{padding:.7rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;position:relative;z-index:9;}
.year-tabs{display:flex;flex-wrap:wrap;gap:.3rem;}
.year-tab{padding:.32rem.8rem;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-family:'Space Mono',monospace;font-size:.68rem;cursor:pointer;transition:all.2s;white-space:nowrap;}
.year-tab.active{background:linear-gradient(135deg,var(--sun),var(--sun2));border-color:transparent;color:#000;font-weight:700;box-shadow:0 0 12px rgba(255,184,0,0.35);}
.year-tab:hover:not(.active){border-color:var(--sun);color:var(--sun);}
.year-tab.future{border-style:dashed;opacity:.4;}
.year-tab.future:hover{opacity:.7;}
.vs-info{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--text3);}
main{padding:1.1rem 2rem;position:relative;z-index:8;animation:fadeIn.35s ease;}
.info-band{display:flex;gap:.4rem;flex-wrap:wrap;background:var(--card-bg);border:1px solid var(--card-border);border-radius:11px;padding:.65rem 1rem;margin-bottom:.9rem;align-items:center;}
.chip{display:flex;align-items:center;gap:.3rem;font-family:'Space Mono',monospace;font-size:.58rem;color:var(--text2);padding:.18rem.48rem;border-radius:999px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);}
.chip strong{color:var(--sun);}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:.65rem;margin-bottom:.9rem;}
.kpi{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:.9rem 1rem;position:relative;overflow:hidden;transition:transform.2s,box-shadow.2s;}
.kpi:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,184,0,0.09);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--sun),var(--sun2));}
.kpi-label{font-size:.58rem;font-family:'Space Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.28rem;}
.kpi-value{font-size:1.45rem;font-weight:800;line-height:1.1;}
.kpi-unit{font-size:.68rem;font-weight:400;color:var(--text2);margin-left:2px;}
.kpi-sub{font-size:.58rem;font-family:'Space Mono',monospace;margin-top:.25rem;}
.kpi-sub.up{color:var(--green);}.kpi-sub.down{color:var(--red);}.kpi-sub.neutral{color:var(--text3);}
.kpi-icon{position:absolute;right:.8rem;top:.8rem;font-size:1.2rem;opacity:.11;}
.prog-track{height:4px;background:rgba(255,255,255,0.09);border-radius:999px;overflow:hidden;margin-top:.35rem;}
.prog-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--sun),var(--green));transition:width.8s ease;}
.prog-lbl{display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:.52rem;color:var(--text3);margin-top:2px;}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:.85rem;margin-bottom:.85rem;}
.g11{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:.85rem;}
.g111{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.85rem;margin-bottom:.85rem;}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:.95rem 1.05rem;}
.ct{font-size:.62rem;font-family:'Space Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.8rem;display:flex;align-items:center;justify-content:space-between;}
.ct-l{display:flex;align-items:center;gap:.32rem;}
.badge{font-size:.52rem;padding:1px 6px;border-radius:999px;background:rgba(255,184,0,0.1);border:1px solid rgba(255,184,0,0.22);color:var(--sun);}
canvas{max-height:210px;}
.donut-wrap{display:flex;align-items:center;justify-content:center;gap:.9rem;flex-wrap:wrap;}
.donut-wrap canvas{max-height:135px;max-width:135px;}
.leg{display:flex;flex-direction:column;gap:.38rem;}
.leg-item{display:flex;align-items:center;gap:.38rem;font-size:.65rem;color:var(--text2);}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.week-nav{display:flex;align-items:center;gap:.4rem;}
.week-sel{font-family:'Space Mono',monospace;font-size:.58rem;background:var(--card-bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:2px 5px;cursor:pointer;}
.roi-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.5rem;}
.roi-item{padding:.55rem.7rem;background:rgba(255,255,255,0.06);border-radius:8px;border:1px solid rgba(255,255,255,0.1);}
.roi-lbl{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--text2);margin-bottom:.18rem;font-weight:600;}
.roi-val{font-size:1.05rem;font-weight:700;}
.roi-bar-wrap{margin-top:.75rem;}
.roi-bar-lbl{display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:.6rem;color:var(--text2);margin-bottom:3px;font-weight:600;}
.roi-bar-track{height:7px;background:rgba(255,255,255,0.08);border-radius:999px;overflow:hidden;}
.roi-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--blue));transition:width 1s ease;}
.roi-note{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--text2);margin-top:4px;font-weight:600;}
.sun-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin-top:.5rem;}
.sun-cell{text-align:center;padding:.28rem.05rem;border-radius:5px;}
.sun-m{font-size:.52rem;color:var(--text2);font-family:'Space Mono',monospace;font-weight:700;}
.sun-v{font-size:.6rem;font-weight:700;margin-top:1px;}
.sun-b{height:3px;border-radius:999px;margin-top:2px;}
.rec-item{padding:.5rem.7rem;background:rgba(255,255,255,0.06);border-radius:8px;border:1px solid rgba(255,255,255,0.1);margin-bottom:.45rem;}
.rec-lbl{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--text2);margin-bottom:.15rem;font-weight:600;}
.rec-val{font-size:1rem;font-weight:700;}
.future-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 2rem;text-align:center;gap:.65rem;}
.future-box.icon{font-size:2.2rem;opacity:.28;}
.future-box h3{font-size:.95rem;color:var(--text2);}
.future-box p{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--text3);max-width:280px;line-height:1.6;}
.no-data-note{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--text2);text-align:center;padding:2rem 1rem;opacity:.7;}
.mois-encours{background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.3);border-radius:12px;padding:.85rem 1.1rem;margin-bottom:.9rem;display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;}
.mois-encours-title{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--red);text-transform:uppercase;letter-spacing:.05em;font-weight:700;white-space:nowrap;}
.mois-encours-main{flex:1;min-width:200px;}
.mois-encours-vals{display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:.65rem;color:var(--text2);margin-bottom:5px;font-weight:600;}
.mois-encours-vals strong{color:#fff;}
.mois-encours-track{height:10px;background:rgba(255,255,255,0.08);border-radius:999px;overflow:hidden;position:relative;}
.mois-encours-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#FF4444,#FF7A00);transition:width 1s ease;position:relative;}
.mois-encours-fill::after{content:'';position:absolute;top:0;right:0;bottom:0;width:3px;background:rgba(255,255,255,0.6);border-radius:999px;}
.mois-encours-sub{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--text3);margin-top:4px;}
.mois-encours-kpi{display:flex;gap:.8rem;flex-wrap:wrap;}
.mois-kpi{text-align:center;}
.mois-kpi-val{font-size:1.1rem;font-weight:800;color:#fff;}
.mois-kpi-lbl{font-family:'Space Mono',monospace;font-size:.55rem;color:var(--text3);}
#pdf-print{display:none;}
@media print{
  body *{display:none!important;}
  #pdf-print{display:block!important;}
  #pdf-print *{display:revert!important;}
  @page{margin:1.5cm;size:A4;}
}
.pdf-page{page-break-after:always;padding:0;font-family:Arial,sans-serif;color:#000;}
.pdf-page:last-child{page-break-after:avoid;}
.pdf-header{border-bottom:3px solid #FFB800;padding-bottom:.6rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:flex-end;}
.pdf-header h1{font-size:16px;font-weight:800;color:#0A1628;margin:0;}
.pdf-header p{font-size:9px;color:#666;margin:2px 0 0;}
.pdf-header.pdf-date{font-size:9px;color:#999;text-align:right;}
.pdf-section-title{font-size:11px;font-weight:700;color:#0A1628;text-transform:uppercase;letter-spacing:.05em;margin:1rem 0.4rem;padding-left:.4rem;border-left:3px solid #FFB800;}
.pdf-kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1rem;}
.pdf-kpi{background:#F8F9FA;border:1px solid #E0E0E0;border-radius:6px;padding:.5rem.7rem;}
.pdf-kpi-lbl{font-size:8px;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.pdf-kpi-val{font-size:14px;font-weight:800;color:#0A1628;}
.pdf-kpi-unit{font-size:9px;font-weight:400;color:#888;}
.pdf-kpi-sub{font-size:8px;color:#888;margin-top:1px;}
.pdf-table{width:100%;border-collapse:collapse;font-size:9px;margin-bottom:1rem;}
.pdf-table th{background:#0A1628;color:#fff;padding:.35rem.5rem;text-align:center;font-size:8.5px;font-weight:700;}
.pdf-table th:first-child{text-align:left;}
.pdf-table td{padding:.3rem.5rem;border-bottom:1px solid #F0F0F0;text-align:center;color:#333;}
.pdf-table td:first-child{text-align:left;font-weight:600;color:#0A1628;}
.pdf-table tr:nth-child(even) td{background:#F8F9FA;}
.pdf-table tr.total-row td{background:#FFF8E7!important;font-weight:700;color:#0A1628;border-top:2px solid #FFB800;}
.pdf-table.sun-col{color:#FF7A00;font-weight:700;}
.pdf-table.green-col{color:#00995A;font-weight:700;}
.pdf-table.blue-col{color:#0066CC;font-weight:600;}
.pdf-table.red-col{color:#CC0000;font-weight:600;}
.pdf-info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.4rem;margin-bottom:1rem;}
.pdf-info-item{background:#F8F9FA;border:1px solid #E8E8E8;border-radius:4px;padding:.35rem.6rem;display:flex;justify-content:space-between;align-items:center;}
.pdf-info-lbl{font-size:8.5px;color:#666;}
.pdf-info-val{font-size:9px;font-weight:700;color:#0A1628;}
.pdf-footer{font-size:7.5px;color:#aaa;text-align:center;border-top:1px solid #eee;padding-top:.4rem;margin-top:.5rem;}
.pdf-roi-bar{height:8px;background:#E8E8E8;border-radius:999px;overflow:hidden;margin:.3rem 0;}
.pdf-roi-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#00C878,#0088FF);}
footer{text-align:center;padding:.9rem;font-family:'Space Mono',monospace;font-size:.55rem;color:var(--text3);border-top:1px solid var(--border);position:relative;z-index:8;}
@media(max-width:900px){.g21,.g111{grid-template-columns:1fr;}.g11{grid-template-columns:1fr;}}
@media(max-width:768px){main,header,.year-row{padding:.85rem 1rem;}.kpi-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:420px){.logo-text p{display:none;}.kpi-grid{grid-template-columns:repeat(2,1fr);}}

<body>
<header>
  <div class="logo">
    <a href="index.html" style="background:transparent;color:var(--muted);border:1px solid var(--bdr);padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;text-decoration:none;transition:.2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--muted)'">← Accueil</a>
    <div class="sun-icon">☀️</div>
    <div class="logo-text">
      <h1>Suivi Solaire — Saint-Léger</h1>
      <p>SunPower Maxeon 3 · 10×420Wc · 4,2kWc · Plein Sud · 33° · Gaume 6747, BE</p>
    </div>
  </div>
  <div class="header-right">
    <div class="update-info" id="update-info">Chargement...</div>
    <button class="btn-icon no-print" onclick="toggleTheme()" title="Mode clair/sombre" id="theme-btn">🌙</button>
    <button class="btn-icon no-print" onclick="exportPDF()" title="Exporter PDF">📄</button>
    <button class="btn-icon no-print" onclick="refreshData()" title="Actualiser">🔄</button>
  </div>
</header>
<div class="year-row no-print">
  <div class="year-tabs" id="year-tabs"></div>
  <div class="vs-info" id="vs-info"></div>
</div>
<main id="main">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;gap:1rem;">
    <div style="width:180px;height:3px;background:linear-gradient(90deg,var(--sun),var(--sun2),var(--sun));background-size:200%;animation:pulse 1.5s infinite;border-radius:999px;"></div>
    <p style="font-family:'Space Mono',monospace;font-size:.72rem;color:var(--text3);">Chargement des données Google Sheets...</p>
  </div>
</main>
<div id="pdf-print"></div>
<footer>☀️ Suivi Solaire · SunPower Maxeon 3 · Saint-Léger 6747, Belgique · Installation Août 2023 · Données temps réel Google Sheets</footer>

<script>
// ===== CONFIG =====

// ===== CSV =====
function parseCSV(txt) {
  return txt.trim().split('\n').map(l => {
    const cols=[];let cur='',inQ=false;
    for(const c of l){if(c==='"'){inQ=!inQ;continue;}if(c===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=c;}
    cols.push(cur.trim());return cols;
  });
}
function num(v){
  if(!v||v===''||v==='\u2014'||v==='N/A')return null;
  const s=String(v).trim();
  if(s.indexOf('#')>=0||s==='')return null;
  let clean=s.replace(/ /g,'');
  clean=clean.replace(',','.');
  clean=clean.replace(/[^0-9.-]/g,'');
  const n=parseFloat(clean);
  return isNaN(n)?null:n;
}

function processAll(relRows, bilanRows, diagRows) {
  const byYear = {};
  let startIdx = 0;
  for(let i=0;i<relRows.length;i++){
    const r=relRows[i];
    if(!r[0]||r[0].trim()==='')continue;
    if(r[0].match(/^\d{2}\/\d{2}\/\d{4}$/)){startIdx=i;break;}
  }
  for(const row of relRows.slice(startIdx)){
    if(!row[0]||row[0].trim()==='')continue;
    if(!row[0].match(/^\d{2}\/\d{2}\/\d{4}$/))continue;
    const p=row[0].split('/');
    const dt=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
    if(isNaN(dt.getTime()))continue;
    const y=dt.getFullYear(),m=dt.getMonth(),d=dt.getDate();
    if(y<2022||y>2030)continue;
    const prod=num(row[3]);
    if(prod===null||prod<=0)continue;
    const inj=num(row[6]);
    const consoRes=num(row[7]);
    const consoReel=num(row[8]);
    const ac=num(row[9]);
    const acFinal=ac!==null?ac:(inj!==null?Math.max(0,Math.round((prod-inj)*10)/10):Math.round(prod*0.55*10)/10);
    const injFinal=inj!==null?inj:Math.max(0,Math.round((prod-acFinal)*10)/10);
    if(!byYear[y])byYear[y]={monthly:Array(12).fill(null),injection:Array(12).fill(null),autoconso:Array(12).fill(null),dailyByMonth:{}};
    byYear[y].monthly[m]=Math.round(((byYear[y].monthly[m]||0)+prod)*10)/10;
    byYear[y].injection[m]=Math.round(((byYear[y].injection[m]||0)+injFinal)*10)/10;
    byYear[y].autoconso[m]=Math.round(((byYear[y].autoconso[m]||0)+acFinal)*10)/10;
    if(!byYear[y].dailyByMonth[m])byYear[y].dailyByMonth[m]=[];
    byYear[y].dailyByMonth[m].push({day:d,prod:prod,ac:acFinal,inj:injFinal,consoRes:consoRes||0,consoReel:consoReel||0});
  }
  const mn=['jan','fév','mar','avr','mai','juin','juil','aoû','sep','oct','nov','déc'];
  let histIdx=-1;
  for(let i=0;i<diagRows.length;i++){
    if(diagRows[i][0]&&diagRows[i][0].includes('Historique')){histIdx=i+2;break;}
    if(diagRows[i][1]==='2023'||diagRows[i][1]==='2024'){histIdx=i;break;}
  }
  if(histIdx>0){
    for(let i=histIdx;i<Math.min(histIdx+13,diagRows.length);i++){
      const row=diagRows[i];
      const mn2=(row[0]||'').toLowerCase().trim();
      if(!mn2)continue;
      const mn2n=mn2.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      const mi=mn.findIndex(x=>{const xn=x.normalize('NFD').replace(/[\u0300-\u036f]/g,'');return mn2.startsWith(x)||mn2n.startsWith(xn);});
      if(mi<0)continue;
      [[2023,1],[2024,2],[2025,3],[2026,4]].forEach(([y,ci])=>{
        const v=num(row[ci]);
        if(v!==null&&v>0&&v<1000){
          if(!byYear[y])byYear[y]={monthly:Array(12).fill(null),injection:Array(12).fill(null),autoconso:Array(12).fill(null),dailyByMonth:{}};
          byYear[y].monthly[mi]=Math.round(v*10)/10;
        }
      });
    }
  }
  for(const[ys,yd] of Object.entries(byYear)){
    const y=parseInt(ys);
    if(!pData[y]) pData[y]=yd;
    else {
      for(let m=0;m<12;m++){
        if(yd.monthly[m])pData[y].monthly[m]=yd.monthly[m];
        if(yd.autoconso[m])pData[y].autoconso[m]=yd.autoconso[m];
        if(yd.injection[m])pData[y].injection[m]=yd.injection[m];
      }
      if(Object.keys(yd.dailyByMonth).length>0)pData[y].dailyByMonth=yd.dailyByMonth;
      pData[y].total=Math.round(pData[y].monthly.filter(x=>x).reduce((a,b)=>a+b,0)*10)/10;
    }
  }
  if(pData[2023])pData[2023].note='5 mois (Août–Déc)';
  if(pData[2026]){const f=pData[2026].monthly.filter(x=>x).length;if(f<12)pData[2026].note=`${f} mois enregistré${f>1?'s':''}`;}
}

// ===== ROI =====
function computeROI(){
  let totalSaved=0;
  for(const yd of Object.values(pData)){
    if(!yd.monthly)continue;
    const prod=yd.monthly.filter(x=>x).reduce((a,b)=>a+b,0);
    totalSaved+=prod*KWH_PRICE_REAL;
  }
  const pct=Math.min(100,Math.round(totalSaved/INSTALL_COST*100));
  const avgAnnual=totalSaved/Math.max(1,Object.keys(pData).length);
  const yearsLeft=Math.max(0,Math.round((INSTALL_COST-totalSaved)/avgAnnual*10)/10);
  return{totalSaved:Math.round(totalSaved),pct,yearsLeft};
}

function updateWeekSelect(year, monthIndex) {
  const sel = document.getElementById('sel-week');
  sel.innerHTML = '<option value="all">Vue globale</option>';

  const firstDay = new Date(year, monthIndex, 1);
  const lastDay = new Date(year, monthIndex + 1, 0);

  let current = new Date(firstDay);
  const dayOfWeek = current.getDay();
  const mondayOffset = dayOfWeek === 0? 6 : dayOfWeek - 1;
  current.setDate(current.getDate() - mondayOffset);

  let weekIndex = 0;
  while(current <= lastDay) {
    const monday = new Date(current);
    const sunday = new Date(current);
    sunday.setDate(monday.getDate() + 6);

    const displayStart = monday < firstDay? firstDay : monday;
    const displayEnd = sunday > lastDay? lastDay : sunday;

    if(displayStart <= lastDay && displayEnd >= firstDay) {
      const label = `S${weekIndex + 1} (${displayStart.getDate()}-${displayEnd.getDate()}/${monthIndex+1})`;
      sel.innerHTML += `<option value="${weekIndex}">${label}</option>`;
      weekIndex++;
    }
    current.setDate(current.getDate() + 7);
  }
}

function renderWeekCharts(){
  const selM=document.getElementById('sel-month');
  const selW=document.getElementById('sel-week');
  if(!selM)return;
  const mIdx=parseInt(selM.value);
  const wVal=selW?selW.value:'all';

  updateWeekSelect(curYear, mIdx);

  if(charts.week){try{charts.week.destroy();}catch(e){}}
  const d=pData[curYear];
  const days=d&&d.dailyByMonth?d.dailyByMonth[mIdx]:null;

  if(wVal==='all'){
    const firstDay = new Date(curYear, mIdx, 1);
    const lastDay = new Date(curYear, mIdx + 1, 0);
    let current = new Date(firstDay);
    const dayOfWeek = current.getDay();
    const mondayOffset = dayOfWeek === 0? 6 : dayOfWeek - 1;
    current.setDate(current.getDate() - mondayOffset);

    const weekTotals = [];
    const weekLabels = [];
    let weekIndex = 0;

    while(current <= lastDay) {
      const monday = new Date(current);
      const sunday = new Date(current);
      sunday.setDate(monday.getDate() + 6);

      const displayStart = monday < firstDay? firstDay : monday;
      const displayEnd = sunday > lastDay? lastDay : sunday;

      if(displayStart <= lastDay && displayEnd >= firstDay) {
        let total = 0;
        if(days) {
          days.forEach(({day,prod})=>{
            const date = new Date(curYear, mIdx, day);
            if(date >= monday && date <= sunday) total += prod;
          });
        } else if(d&&d.monthly[mIdx]){
          total = d.monthly[mIdx] / 4.3;
        }
        weekTotals.push(Math.round(total*10)/10);
        weekLabels.push(`S${weekIndex+1} (${displayStart.getDate()}-${displayEnd.getDate()})`);
        weekIndex++;
      }
      current.setDate(current.getDate() + 7);
    }

    const maxV=Math.max(...weekTotals.filter(x=>x>0))||1;
    charts.week=new Chart(document.getElementById('cWeek').getContext('2d'),{
      type:'bar',
      data:{labels:weekLabels,datasets:[{label:'Production (kWh)',data:weekTotals,backgroundColor:weekTotals.map(v=>v===Math.max(...weekTotals)?'rgba(255,122,0,0.9)':'rgba(255,184,0,0.62)'),borderRadius:8,borderSkipped:false}]},
      options:{...baseOpts('kWh'),plugins:{...baseOpts('kWh').plugins,tooltip:{callbacks:{label:ctx=>` ${ctx.raw} kWh`}}}}
    });
  } else {
    renderDayChart();
  }
}

function renderDayChart(){
  const selM=document.getElementById('sel-month');
  const selW=document.getElementById('sel-week');
  if(!selM||!selW)return;
  const mIdx=parseInt(selM.value);
  const wIdx=parseInt(selW.value);
  if(isNaN(wIdx))return renderWeekCharts();

  if(charts.week){try{charts.week.destroy();}catch(e){}}
  const d=pData[curYear];
  const allDays=d&&d.dailyByMonth?d.dailyByMonth[mIdx]:null;

  const firstDay = new Date(curYear, mIdx, 1);
  const dayOfWeek = firstDay.getDay();
  const mondayOffset = dayOfWeek === 0? 6 : dayOfWeek - 1;
  const firstMonday = new Date(firstDay);
  firstMonday.setDate(firstDay.getDate() - mondayOffset);

  const weekStart = new Date(firstMonday);
  weekStart.setDate(firstMonday.getDate() + wIdx * 7);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6);

  const isDark=!document.body.classList.contains('light');
  const tc=isDark?'rgba(255,255,255,0.38)':'rgba(0,0,0,0.4)';
  const gc=isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.06)';

  const weekDays=allDays.filter(({day})=>{

  const lbls=weekDays.map(({day})=>`${String(day).padStart(2,'0')}/${String(mIdx+1).padStart(2,'0')}`);

  charts.week=new Chart(document.getElementById('cWeek').getContext('2d'),{

        data:weekDays.map(x=>Math.round(x.ac*10)/10),

        stack:'conso',

      {
        label:'Conso Réseau',

function buildPDFContent(){
  const now = new Date();
  const dateStr = now.toLocaleDateString('fr-BE',{day:'2-digit',month:'long',year:'numeric'});
  const MOIS_F = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const roi = computeROI();
  const d = pData[curYear];
  if(!d){document.getElementById('pdf-print').innerHTML='<p>Pas de données.</p>';return;}
  const totalAC = d.autoconso?Math.round(d.autoconso.filter(x=>x).reduce((a,b)=>a+b,0)*10)/10:Math.round(d.total*.55);
  const totalInj = d.injection?Math.round(d.injection.filter(x=>x).reduce((a,b)=>a+b,0)*10)/10:Math.round(d.total*.45);
  const rend = Math.round(d.total/PUISSANCE);
  const savings = Math.round(d.total*KWH_PRICE_REAL);
  const prog = Math.min(100,Math.round(d.total/OBJECTIF*100));
  const prevKey = PREV_MAP[curYear];
  const prev = prevKey?pData[prevKey]:null;
  const diff = prev?Math.round((d.total-prev.total)/prev.total*100):null;
  let kpiHTML = '';

  return {
    jourActuel: 3851.3,
    nuitActuel: 74955.6,
    jourMax: 4678,
    nuitMax: 74739
  };
}

    jourActuel: parseFloat(document.getElementById('input-jour-actuel').value) || null,
    nuitActuel: parseFloat(document.getElementById('input-nuit-actuel').value) || null,
    jourMax: parseFloat(document.getElementById('input-jour-max').value) || null,

  };

}

function saveReleveConfig(){

function renderReleveModule(){
  const cfg = getReleveConfig();
  document.getElementById('input-jour-actuel').value = cfg.jourActuel || '';
  document.getElementById('input-nuit-actuel').value = cfg.nuitActuel || '';
  document.getElementById('input-jour-max').value = cfg.jourMax || '';
  document.getElementById('input-nuit-max').value = cfg.nuitMax || '';

  if(!cfg.jourActuel ||!cfg.nuitActuel ||!cfg.jourMax ||!cfg.nuitMax){
    document.getElementById('releve-resultats').style.display = 'none';
    return;
  }

  document.getElementById('releve-resultats').style.display = 'block';

  const margeJour = Math.round((cfg.jourMax - cfg.jourActuel) * 10) / 10;
  const margeNuit = Math.round((cfg.nuitMax - cfg.nuitActuel) * 10) / 10;
  const margeGlobale = Math.round((margeJour + margeNuit) * 10) / 10;

  const indexGlobal = Math.round((cfg.jourActuel + cfg.nuitActuel) * 10) / 10;
  const limiteGlobale = Math.round((cfg.jourMax + cfg.nuitMax) * 10) / 10;

  document.getElementById('estim-jour').textContent = cfg.jourActuel.toFixed(1) + ' kWh';
  document.getElementById('marge-jour').textContent = (margeJour>=0?'+':'') + margeJour.toFixed(1) + ' kWh';
  document.getElementById('marge-jour').style.color = margeJour > 0? 'var(--green)' : 'var(--red)';

  document.getElementById('estim-nuit').textContent = cfg.nuitActuel.toFixed(1) + ' kWh';
  document.getElementById('marge-nuit').textContent = (margeNuit>=0?'+':'') + margeNuit.toFixed(1) + ' kWh';
  document.getElementById('marge-nuit').style.color = margeNuit > 0? 'var(--green)' : 'var(--red)';

  document.getElementById('index-estime-global').textContent = indexGlobal.toFixed(1) + ' kWh';
  document.getElementById('marge-globale').textContent = (margeGlobale>=0?'+':'') + margeGlobale.toFixed(1) + ' kWh';
  document.getElementById('marge-globale').style.color = margeGlobale > 0? 'var(--green)' : 'var(--red)';
  document.getElementById('boni-hiver-total').textContent = Math.max(0, margeGlobale).toFixed(1) + ' kWh';

    conseilEl.style.color = 'var(--red)';
  } else {
    conseil = `✅ BONI : Tu as ${margeGlobale.toFixed(0)} kWh d'avance au total. Jour: +${margeJour.toFixed(0)} kWh / Nuit: ${margeNuit>=0?'+':''}${margeNuit.toFixed(0)} kWh.`;
    conseilEl.style.borderLeftColor = 'var(--green)';
    conseilEl.style.color = 'var(--green)';
  }
  conseilEl.textContent = conseil;
}

  // Si pas de données journalières, on estime via injection
  if(consoReseauJour === 0 && consoReseauNuit === 0){
    // Fallback : on prend 30% de la prod comme conso réseau estimée
    let prodDepuisJuillet = 0;
    if(d && d.monthly){ for(let m=6; m<12; m++){ if(d.monthly[m]) prodDepuisJuillet += d.monthly[m]; } }
    if(d2 && d2.monthly){ for(let m=0; m<=mois; m++){ if(d2.monthly[m]) prodDepuisJuillet += d2.monthly[m]; } }
    consoReseauJour = prodDepuisJuillet * 0.06; // 20% de 30%
    consoReseauNuit = prodDepuisJuillet * 0.24; // 80% de 30%
  }

  const estimJour = Math.round((cfg.jourJuillet + consoReseauJour) * 10) / 10;
  const estimNuit = Math.round((cfg.nuitJuillet + consoReseauNuit) * 10) / 10;
  const estimGlobal = Math.round((estimJour + estimNuit) * 10) / 10;

  const margeJour = Math.round((cfg.jourMax - estimJour) * 10) / 10;
  const margeNuit = Math.round((cfg.nuitMax - estimNuit) * 10) / 10;
  const margeGlobale = Math.round(((cfg.jourMax + cfg.nuitMax) - estimGlobal) * 10) / 10;

  const boniHiverTotal = Math.max(0, margeGlobale);

  document.getElementById('estim-jour').textContent = estimJour.toFixed(1) + ' kWh';

  document.getElementById('index-estime-global').textContent = estimGlobal.toFixed(1) + ' kWh';
  document.getElementById('marge-globale').textContent = (margeGlobale>=0?'+':'') + margeGlobale.toFixed(1) + ' kWh';
  document.getElementById('marge-globale').style.color = margeGlobale > 300? 'var(--green)' : margeGlobale > 0? 'var(--sun)' : 'var(--red)';

    conseilEl.style.color = 'var(--red)';
  } else if(margeGlobale < 100){

    conseilEl.style.borderLeftColor = 'var(--red)';
    conseilEl.style.color = 'var(--red)';
  } else if(margeGlobale < 400){
    conseil = `🟡 Attention : ${margeGlobale.toFixed(0)} kWh de marge totale. Jour: +${margeJour.toFixed(0)} kWh / Nuit: +${margeNuit.toFixed(0)} kWh.`;
    conseilEl.style.borderLeftColor = 'var(--sun)';
    conseilEl.style.color = 'var(--sun)';
  } else {
    conseil = `✅ Tranquille : ${margeGlobale.toFixed(0)} kWh de boni total. Jour: +${margeJour.toFixed(0)} kWh / Nuit: +${margeNuit.toFixed(0)} kWh.`;
    conseilEl.style.borderLeftColor = 'var(--green)';
