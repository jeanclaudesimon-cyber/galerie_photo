<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recette — La Cuisine de JC</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lato:wght@300;400;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --or:#e67627;--or2:#f4a261;--or3:rgba(230,118,39,0.1);--or4:rgba(230,118,39,0.05);
  --fond:#f2cbaa;--fond2:#fdf6ee;--fond3:#fff8f2;
  --noir:#2c1810;--noir2:#4a2c1a;--gris:#8a6a55;
  --bdr:rgba(230,118,39,0.2);--bdr2:rgba(230,118,39,0.45);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Lato',sans-serif;background:var(--fond);color:var(--noir);min-height:100vh}

header{background:linear-gradient(135deg,var(--noir),var(--noir2));padding:0 2rem;position:sticky;top:0;z-index:300;box-shadow:0 2px 20px rgba(44,24,16,.3)}
.hdr{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px}
.logo{font-family:'Dancing Script',cursive;font-size:1.3rem;color:var(--fond);text-decoration:none}
.back-btn{color:rgba(242,203,170,.6);font-size:11px;letter-spacing:1px;text-decoration:none;padding:5px 12px;border:1px solid rgba(242,203,170,.15);border-radius:3px;transition:.2s;font-family:'Lato',sans-serif}
.back-btn:hover{color:var(--or);border-color:var(--or)}

/* PAGE */
.page{max-width:900px;margin:0 auto;padding:2rem;display:flex;flex-direction:column;gap:1.5rem}

/* CADRE GÉNÉRIQUE */
.cadre{background:var(--fond3);border:2px solid var(--bdr2);border-radius:18px;position:relative;padding:1.5rem 1.5rem 1.5rem}
.cadre-titre-wrap{position:absolute;top:-1px;left:1.5rem;display:flex;align-items:center;gap:0}
.cadre-titre-line-l{height:2px;width:16px;background:var(--bdr2)}
.cadre-titre-text{background:var(--fond3);padding:0 .6rem;font-family:'Lato',sans-serif;font-size:9px;letter-spacing:3px;color:var(--or);text-transform:uppercase;font-weight:700;white-space:nowrap;margin-top:-1px}
.cadre-titre-line-r{height:2px;flex:1;background:var(--bdr2);max-width:60px}
.cadre-body{margin-top:.5rem}

/* CADRE 1 — TITRE RECETTE */
.recette-titre{font-family:'Playfair Display',serif;font-size:2rem;color:var(--noir);font-weight:900;line-height:1.2;margin-bottom:.8rem}
.recette-meta{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;margin-bottom:.6rem}
.tag-cat{background:var(--or);color:#fff;padding:4px 12px;border-radius:20px;font-size:11px;font-family:'Lato',sans-serif;letter-spacing:1px}
.tag-diff{background:var(--or3);border:1px solid var(--bdr);color:var(--or);padding:4px 12px;border-radius:20px;font-size:11px;font-family:'Lato',sans-serif}
.etoiles{color:var(--or);font-size:1.1rem;letter-spacing:2px}
.etoiles-vide{color:rgba(230,118,39,.25)}
.recette-desc-hero{font-family:'Playfair Display',serif;font-style:italic;font-size:1.05rem;color:var(--gris);line-height:1.7}

/* PHOTO */
.photo-recette{width:100%;max-height:320px;object-fit:cover;border-radius:12px;border:2px solid var(--bdr)}
.photo-placeholder{width:100%;height:180px;background:linear-gradient(135deg,var(--or3),var(--or4));border-radius:12px;border:2px dashed var(--bdr2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;color:var(--gris);font-style:italic;font-size:.9rem}

/* CADRE 2 — INGRÉDIENTS */
.portions-ctrl{display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem;background:var(--or3);border:1px solid var(--bdr);border-radius:10px;padding:.6rem 1rem;width:fit-content}
.portions-label{font-family:'Lato',sans-serif;font-size:11px;letter-spacing:2px;color:var(--or);text-transform:uppercase}
.portions-btn{width:28px;height:28px;background:var(--or);border:none;border-radius:6px;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;line-height:1}
.portions-btn:hover{background:var(--noir)}
.portions-num{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--noir);font-weight:700;min-width:28px;text-align:center}
.ing-list{display:flex;flex-direction:column;gap:.5rem}
.ing-item{display:flex;align-items:center;gap:.8rem}
.ing-nom{font-size:.95rem;color:var(--noir2);min-width:140px}
.ing-qte-box{background:rgba(230,118,39,.12);border:1px solid var(--bdr);border-radius:6px;padding:3px 10px;font-family:'Lato',sans-serif;font-size:.88rem;color:var(--or);font-weight:700;min-width:80px;text-align:center}
.btn-liste-course{margin-top:1.2rem;display:inline-flex;align-items:center;gap:6px;background:var(--noir);color:var(--fond);padding:9px 18px;border-radius:10px;font-size:11px;letter-spacing:1px;font-family:'Lato',sans-serif;border:none;cursor:pointer;transition:.2s}
.btn-liste-course:hover{background:var(--or)}

/* CADRE 3 — PRÉPARATION */
.etapes-list{display:flex;flex-direction:column}
.etape{display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--bdr);align-items:flex-start}
.etape:last-child{border-bottom:none}
.etape-num{width:28px;height:28px;border-radius:50%;background:rgba(230,118,39,.15);border:1.5px solid var(--or);display:flex;align-items:center;justify-content:center;font-size:.82rem;color:var(--or);font-weight:700;flex-shrink:0;margin-top:2px}
.etape-texte{font-size:.97rem;color:var(--noir2);line-height:1.75}

/* BOUTON IMPRIMER */
.btn-imprimer{display:inline-flex;align-items:center;gap:6px;background:var(--or3);color:var(--or);padding:9px 18px;border-radius:10px;font-size:11px;letter-spacing:1px;font-family:'Lato',sans-serif;border:1px solid var(--bdr2);cursor:pointer;transition:.2s;margin-top:1rem}
.btn-imprimer:hover{background:var(--or);color:#fff}

/* MODAL LISTE DE COURSES */
.modal-overlay{position:fixed;inset:0;background:rgba(44,24,16,.7);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-box{background:var(--fond3);border-radius:20px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(44,24,16,.4)}
.modal-header{background:linear-gradient(135deg,var(--or),var(--or2));padding:1rem 1.5rem;border-radius:20px 20px 0 0;display:flex;align-items:center;justify-content:space-between}
.modal-titre{font-family:'Playfair Display',serif;font-size:1.1rem;color:#fff;font-weight:700}
.modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.2s}
.modal-close:hover{background:rgba(255,255,255,.4)}
.modal-body{padding:1.2rem 1.5rem;max-height:60vh;overflow-y:auto}
.course-item{display:flex;align-items:center;gap:.8rem;padding:.5rem 0;border-bottom:1px solid var(--bdr)}
.course-cb{width:18px;height:18px;accent-color:var(--or);cursor:pointer;flex-shrink:0}
.course-label{font-size:.95rem;color:var(--noir2)}
.course-label.barre{text-decoration:line-through;color:var(--gris)}
.btn-copier{margin-top:1rem;width:100%;background:var(--or);border:none;color:#fff;padding:10px;border-radius:10px;font-size:11px;letter-spacing:1px;font-family:'Lato',sans-serif;cursor:pointer;transition:.2s}
.btn-copier:hover{background:var(--noir)}

.statusbar{background:var(--noir);padding:8px 2rem;display:flex;justify-content:space-between;font-size:10px;color:rgba(242,203,170,.3);font-family:'Lato',sans-serif;letter-spacing:1px}

@media print{
  header,.statusbar,.btn-imprimer,.btn-liste-course,.portions-btn{display:none!important}
  body{background:#fff}
  .cadre{border:1px solid #ccc;box-shadow:none}
}
@media(max-width:600px){
  .page{padding:1rem}
  .recette-titre{font-size:1.5rem}
}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <a href="cuisine.html" class="logo">🍳 La Cuisine de JC</a>
    <a href="cuisine.html" class="back-btn">← Retour aux recettes</a>
  </div>
</header>

<div class="page" id="pageRecette">
  <!-- Chargé dynamiquement -->
  <div style="text-align:center;padding:3rem;color:var(--gris);font-style:italic;font-family:'Playfair Display',serif">
    Chargement de la recette…
  </div>
</div>

<!-- MODAL LISTE DE COURSES -->
<div class="modal-overlay" id="modalCourses" onclick="fermerCourses(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-titre">🛒 Liste de Courses</div>
      <button class="modal-close" onclick="fermerCoursesBtn()">×</button>
    </div>
    <div class="modal-body" id="coursesBody"></div>
  </div>
</div>

<div class="statusbar">
  <span>🍳 La Cuisine de JC</span>
  <span id="sclock"></span>
</div>

<script>
// ═══════════════════════════════════════════
// BASE DE DONNÉES RECETTES
// Ajoute tes recettes ici — même structure que cuisine.html
// ═══════════════════════════════════════════
const CATEGORIES_MAP = {
  zakouski:'🥂 Zakouski', entrees:'🥗 Entrées',
  plats:'🍖 Plats Uniques', mijotes:'🫕 Plats Mijotés', desserts:'🎂 Desserts'
};

const RECETTES = [
  {
    id: 1,
    cat: 'mijotes',
    nom: 'Chili con carne revisité',
    desc: 'Une version généreuse et parfumée avec légumes frais du marché et haricots rouges',
    difficulte: 2,
    favori: true,
    photo: '', // ex: 'https://raw.githubusercontent.com/jeanclaudesimon-cyber/galerie_photo/main/images/chili.webp'
    portions_base: 4,
    ingredients: [
      { nom:'Bœuf haché',        qte:500, unite:'g' },
      { nom:'Haricots rouges',   qte:400, unite:'g' },
      { nom:'Tomates concassées',qte:400, unite:'g' },
      { nom:'Oignon',            qte:2,   unite:'' },
      { nom:'Poivron rouge',     qte:1,   unite:'' },
      { nom:'Ail',               qte:3,   unite:'gousses' },
      { nom:'Cumin',             qte:1,   unite:'c.à.c' },
      { nom:'Paprika fumé',      qte:1,   unite:'c.à.c' },
      { nom:'Piment de Cayenne', qte:0.5, unite:'c.à.c' },
      { nom:'Huile d\'olive',    qte:3,   unite:'cl' },
      { nom:'Sel & poivre',      qte:0,   unite:'q.s.' },
    ],
    etapes: [
      'Émincer l\'oignon et l\'ail. Couper le poivron en petits dés.',
      'Faire revenir l\'oignon dans l\'huile d\'olive à feu moyen pendant 3 minutes jusqu\'à transparence.',
      'Ajouter l\'ail et le poivron, faire revenir encore 2 minutes.',
      'Ajouter le bœuf haché et faire dorer en remuant régulièrement.',
      'Incorporer les tomates concassées, les haricots rouges égouttés, le cumin, le paprika et le piment.',
      'Laisser mijoter à feu doux pendant 30 minutes en remuant de temps en temps.',
      'Rectifier l\'assaisonnement en sel et poivre. Servir avec du riz ou du pain frais.',
    ],
    sheetUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQTque32nwvTAT5uG47r5NJ9R3yJUuPEIvB-TEwdqK10-AYRiMwRRVp0Vd8u8g5OaTBv26G4X69p7xf/pub?gid=10286988&single=true&output=csv'
  },
  {
    id: 2,
    cat: 'plats',
    nom: 'Pâté gaumais',
    desc: 'La recette traditionnelle de la Gaume, terroir belge par excellence',
    difficulte: 4,
    favori: true,
    photo: '',
    portions_base: 6,
    ingredients: [
      { nom:'Porc (épaule)',   qte:600, unite:'g' },
      { nom:'Veau',            qte:400, unite:'g' },
      { nom:'Lard fumé',       qte:200, unite:'g' },
      { nom:'Pâte brisée',     qte:500, unite:'g' },
      { nom:'Échalotes',       qte:4,   unite:'' },
      { nom:'Persil frais',    qte:1,   unite:'bouquet' },
      { nom:'Thym',            qte:2,   unite:'branches' },
      { nom:'Laurier',         qte:2,   unite:'feuilles' },
      { nom:'Vin blanc sec',   qte:15,  unite:'cl' },
      { nom:'Œuf (dorure)',    qte:1,   unite:'' },
      { nom:'Sel & poivre',    qte:0,   unite:'q.s.' },
    ],
    etapes: [
      'Hacher grossièrement le porc, le veau et le lard. Mélanger avec les échalotes finement émincées, le persil haché, le thym et le laurier.',
      'Assaisonner généreusement, ajouter le vin blanc. Laisser mariner au frais minimum 2 heures (idéalement une nuit).',
      'Préchauffer le four à 180°C. Étaler les 2/3 de la pâte brisée dans un moule à cake beurré.',
      'Garnir avec la farce marinée en tassant bien. Recouvrir avec le reste de pâte, souder les bords.',
      'Faire une cheminée au centre, dorer à l\'œuf battu.',
      'Enfourner 1h15 à 180°C. Vérifier la cuisson avec une sonde (70°C à cœur).',
      'Laisser refroidir complètement avant de démouler. Se déguste froid avec cornichons et pain de campagne.',
    ],
    sheetUrl: ''
  },
  {
    id: 3, cat:'entrees', nom:'Salade de chèvre chaud', desc:'Miel, noix, pain grillé', difficulte:1, favori:false, photo:'',
    portions_base:4,
    ingredients:[
      {nom:'Crottin de chèvre',qte:4,unite:''},
      {nom:'Salade mesclun',qte:200,unite:'g'},
      {nom:'Noix',qte:50,unite:'g'},
      {nom:'Miel liquide',qte:2,unite:'c.à.s'},
      {nom:'Tranches de pain',qte:4,unite:''},
      {nom:'Huile d\'olive',qte:4,unite:'cl'},
      {nom:'Vinaigre balsamique',qte:2,unite:'cl'},
      {nom:'Sel & poivre',qte:0,unite:'q.s.'},
    ],
    etapes:[
      'Préchauffer le four en mode grill. Poser les crottins sur les tranches de pain.',
      'Enfourner 5-7 minutes jusqu\'à légère coloration dorée.',
      'Préparer la vinaigrette : mélanger huile d\'olive, vinaigre balsamique, sel et poivre.',
      'Dresser la salade dans les assiettes, ajouter les noix.',
      'Déposer les tranches de pain au chèvre chaud, arroser d\'un filet de miel. Servir immédiatement.',
    ],
    sheetUrl:''
  },
  {
    id: 4, cat:'desserts', nom:'Tarte aux pommes maison', desc:'Pâte brisée, cannelle, pommes du jardin', difficulte:2, favori:true, photo:'',
    portions_base:6,
    ingredients:[
      {nom:'Pommes (type Boskoop)',qte:6,unite:''},
      {nom:'Pâte brisée',qte:300,unite:'g'},
      {nom:'Sucre',qte:80,unite:'g'},
      {nom:'Cannelle',qte:1,unite:'c.à.c'},
      {nom:'Beurre',qte:30,unite:'g'},
      {nom:'Jus de citron',qte:2,unite:'cl'},
    ],
    etapes:[
      'Préchauffer le four à 190°C. Étaler la pâte dans un moule à tarte beurré.',
      'Éplucher et couper les pommes en fines lamelles, arroser de jus de citron.',
      'Mélanger les pommes avec le sucre et la cannelle.',
      'Disposer les lamelles de pommes en rosace sur la pâte.',
      'Parsemer de petits morceaux de beurre. Enfourner 35-40 minutes.',
      'Laisser tiédir avant de servir. Délicieux avec une crème fraîche épaisse.',
    ],
    sheetUrl:''
  },
  {
    id: 5, cat:'zakouski', nom:'Verrines avocat-crevettes', desc:'Fraîcheur et élégance', difficulte:1, favori:false, photo:'',
    portions_base:4,
    ingredients:[
      {nom:'Avocats mûrs',qte:2,unite:''},
      {nom:'Crevettes cuites',qte:200,unite:'g'},
      {nom:'Citron vert',qte:1,unite:''},
      {nom:'Crème fraîche',qte:2,unite:'c.à.s'},
      {nom:'Tabasco',qte:0,unite:'quelques gouttes'},
      {nom:'Ciboulette',qte:0,unite:'q.s.'},
      {nom:'Sel & poivre',qte:0,unite:'q.s.'},
    ],
    etapes:[
      'Écraser la chair des avocats à la fourchette avec le jus de citron vert, la crème fraîche et quelques gouttes de tabasco.',
      'Assaisonner en sel et poivre. Bien mélanger pour obtenir une crème lisse.',
      'Répartir la crème d\'avocat dans les verrines (environ 2/3).',
      'Déposer les crevettes par-dessus. Décorer de ciboulette ciselée et d\'un zeste de citron vert.',
      'Servir bien frais.',
    ],
    sheetUrl:''
  },
];

// ═══════════════════════════════════════════
// CHARGEMENT DE LA RECETTE
// ═══════════════════════════════════════════
let portionsActuelles = 4;
let recetteActive = null;

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function renderRecette() {
  const id = parseInt(getParam('id') || '1');
  recetteActive = RECETTES.find(r => r.id === id) || RECETTES[0];
  portionsActuelles = recetteActive.portions_base;
  document.title = recetteActive.nom + ' — La Cuisine de JC';

  const etoiles = '<span class="etoiles">' + '★'.repeat(recetteActive.difficulte) + '</span>' +
    '<span class="etoiles-vide">' + '★'.repeat(5-recetteActive.difficulte) + '</span>';
  const catLabel = CATEGORIES_MAP[recetteActive.cat] || recetteActive.cat;

  document.getElementById('pageRecette').innerHTML = `
    <!-- CADRE 1 : INFO RECETTE -->
    <div class="cadre">
      <div class="cadre-titre-wrap">
        <div class="cadre-titre-line-l"></div>
        <div class="cadre-titre-text">La Recette</div>
        <div class="cadre-titre-line-r"></div>
      </div>
      <div class="cadre-body">
        ${recetteActive.photo
          ? `<img src="${recetteActive.photo}" alt="${recetteActive.nom}" class="photo-recette" style="margin-bottom:1.2rem">`
          : `<div class="photo-placeholder" style="margin-bottom:1.2rem"><span style="font-size:2.5rem">📷</span><span>Photo à venir</span></div>`
        }
        <h1 class="recette-titre">${recetteActive.nom}</h1>
        <div class="recette-meta">
          <span class="tag-cat">${catLabel}</span>
          <span class="tag-diff">${etoiles} Difficulté ${recetteActive.difficulte}/5</span>
        </div>
        <p class="recette-desc-hero">${recetteActive.desc}</p>
      </div>
    </div>

    <!-- CADRE 2 : INGRÉDIENTS -->
    <div class="cadre">
      <div class="cadre-titre-wrap">
        <div class="cadre-titre-line-l"></div>
        <div class="cadre-titre-text">Ingrédients</div>
        <div class="cadre-titre-line-r"></div>
      </div>
      <div class="cadre-body">
        <div class="portions-ctrl">
          <span class="portions-label">Portions</span>
          <button class="portions-btn" onclick="changerPortions(-1)">−</button>
          <span class="portions-num" id="portionsNum">${portionsActuelles}</span>
          <button class="portions-btn" onclick="changerPortions(1)">+</button>
        </div>
        <div class="ing-list" id="ingList"></div>
        <button class="btn-liste-course" onclick="ouvrirListeCourses()">🛒 Liste de courses</button>
      </div>
    </div>

    <!-- CADRE 3 : PRÉPARATION -->
    <div class="cadre">
      <div class="cadre-titre-wrap">
        <div class="cadre-titre-line-l"></div>
        <div class="cadre-titre-text">Préparation</div>
        <div class="cadre-titre-line-r"></div>
      </div>
      <div class="cadre-body">
        <div class="etapes-list">
          ${recetteActive.etapes.map((e,i) => `
            <div class="etape">
              <div class="etape-num">${i+1}</div>
              <div class="etape-texte">${e}</div>
            </div>`).join('')}
        </div>
        <button class="btn-imprimer" onclick="window.print()">🖨️ Imprimer la recette</button>
      </div>
    </div>
  `;
  renderIngredients();
}

function renderIngredients() {
  const ratio = portionsActuelles / recetteActive.portions_base;
  document.getElementById('portionsNum').textContent = portionsActuelles;
  document.getElementById('ingList').innerHTML = recetteActive.ingredients.map(ing => {
    let qteAffichee = '';
    if (ing.qte > 0) {
      const calc = ing.qte * ratio;
      qteAffichee = (calc % 1 === 0 ? calc : parseFloat(calc.toFixed(1))) + (ing.unite ? ' ' + ing.unite : '');
    } else {
      qteAffichee = ing.unite || 'q.s.';
    }
    return `<div class="ing-item">
      <span class="ing-nom">${ing.nom}</span>
      <span class="ing-qte-box">${qteAffichee}</span>
    </div>`;
  }).join('');
}

function changerPortions(delta) {
  portionsActuelles = Math.max(1, portionsActuelles + delta);
  renderIngredients();
}

// ═══════════════════════════════════════════
// LISTE DE COURSES
// ═══════════════════════════════════════════
function ouvrirListeCourses() {
  const ratio = portionsActuelles / recetteActive.portions_base;
  const body = document.getElementById('coursesBody');
  body.innerHTML = `
    <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:.9rem;color:var(--gris);margin-bottom:1rem">
      ${recetteActive.nom} — ${portionsActuelles} personne${portionsActuelles>1?'s':''}
    </div>
    ${recetteActive.ingredients.map((ing, i) => {
      let qteAffichee = '';
      if (ing.qte > 0) {
        const calc = ing.qte * ratio;
        qteAffichee = (calc % 1 === 0 ? calc : parseFloat(calc.toFixed(1))) + (ing.unite ? ' ' + ing.unite : '');
      } else {
        qteAffichee = ing.unite || 'q.s.';
      }
      return `<div class="course-item">
        <input type="checkbox" class="course-cb" id="cb${i}" onchange="barrerItem(${i})">
        <label class="course-label" id="lbl${i}" for="cb${i}">${ing.nom} — <strong>${qteAffichee}</strong></label>
      </div>`;
    }).join('')}
    <button class="btn-copier" onclick="copierListe()">📋 Copier la liste</button>`;
  document.getElementById('modalCourses').classList.add('open');
}

function barrerItem(i) {
  const lbl = document.getElementById('lbl'+i);
  lbl.classList.toggle('barre', document.getElementById('cb'+i).checked);
}

function copierListe() {
  const ratio = portionsActuelles / recetteActive.portions_base;
  const txt = recetteActive.nom + ' (' + portionsActuelles + ' pers.)\n\n' +
    recetteActive.ingredients.map(ing => {
      if (ing.qte > 0) {
        const calc = ing.qte * ratio;
        return '• ' + ing.nom + ' : ' + (calc%1===0?calc:parseFloat(calc.toFixed(1))) + (ing.unite?' '+ing.unite:'');
      }
      return '• ' + ing.nom + ' : ' + (ing.unite||'q.s.');
    }).join('\n');
  navigator.clipboard.writeText(txt).then(() => alert('✓ Liste copiée dans le presse-papier !'));
}

function fermerCourses(e) { if (e.target===document.getElementById('modalCourses')) fermerCoursesBtn(); }
function fermerCoursesBtn() { document.getElementById('modalCourses').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key==='Escape') fermerCoursesBtn(); });

renderRecette();
setInterval(() => { document.getElementById('sclock').textContent = new Date().toLocaleTimeString('fr-BE'); }, 1000);
</script>
</body>
</html>
