<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lecteur — Guitare Basse</title>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
:root{--dk:#0d0d0d;--card:#1a1a1a;--card2:#242424;--txt:#f0f0f0;--muted:#777;--accent:#e8621a;--grn:#5cb87a;--bdr:rgba(255,255,255,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:var(--dk);color:var(--txt);min-height:100vh;display:flex;flex-direction:column}
header{background:linear-gradient(135deg,#1a0a00,#2a1400);border-bottom:2px solid var(--accent);padding:12px 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo h1{font-size:16px;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
.hdr-r{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sel{background:var(--card2);color:var(--txt);border:1px solid var(--bdr);padding:6px 12px;border-radius:7px;font-size:13px}
.abtn{background:transparent;color:var(--muted);border:1px solid var(--bdr);padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;text-decoration:none}
.abtn:hover{color:#fff}

/* YOUTUBE */
#ytWrap{background:#000;border-bottom:1px solid var(--bdr)}
#ytPlayer{width:100%;height:220px}

/* TITRE MORCEAU */
.song-title{padding:12px 1.5rem;background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.song-name{font-size:18px;font-weight:700;color:var(--txt)}
.song-meta{font-size:12px;color:var(--muted)}

/* CONTROLS */
.ctrl{display:flex;gap:8px;align-items:center;padding:10px 1.5rem;background:var(--card);border-bottom:1px solid var(--bdr);flex-wrap:wrap}
.btn{padding:9px 22px;border-radius:8px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
.btn-play{background:var(--accent);color:#fff}
.btn-play:hover{background:#f58340}
.btn-stop{background:var(--card2);color:var(--txt);border:1px solid var(--bdr)}
.timer{font-family:monospace;font-size:18px;color:var(--accent);background:var(--card2);padding:6px 14px;border-radius:7px;min-width:70px;text-align:center}
.prog-wrap{flex:1;min-width:150px;background:rgba(255,255,255,.06);border-radius:4px;height:8px;cursor:pointer;border-radius:8px}
.prog-bar{height:100%;background:var(--accent);border-radius:8px;width:0%;transition:width .1s linear}
.offset-wrap{display:flex;gap:6px;align-items:center}
.offset-btn{background:var(--card2);color:var(--muted);border:1px solid var(--bdr);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer}
.offset-val{font-size:11px;color:var(--muted);background:var(--card2);padding:5px 10px;border-radius:6px;min-width:80px;text-align:center}

/* 3 ACCORDS */
.chords-zone{flex:1;display:flex;flex-direction:column;justify-content:center}

.mc-row{display:flex;align-items:center;padding:14px 1.5rem;border-bottom:1px solid rgba(255,255,255,.04)}
.mc-row:last-child{border-bottom:none}
.mc-row.current{background:rgba(232,98,26,.06);padding:20px 1.5rem}
.mc-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);min-width:80px}
.mc-chord{font-weight:900;line-height:1}
.mc-chord.c1{font-size:72px;color:var(--accent)}
.mc-chord.c2{font-size:42px;color:var(--txt)}
.mc-chord.c3{font-size:28px;color:var(--muted)}
.mc-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.beat-dots{display:flex;gap:8px}
.dot{width:16px;height:16px;border-radius:50%;background:var(--card2);border:1px solid var(--bdr);transition:.1s}
.dot.on{background:var(--accent);box-shadow:0 0 12px rgba(232,98,26,.7)}
.dot.b1{border-color:#f58340;width:20px;height:20px}
.mnum-badge{font-size:11px;color:var(--muted);background:var(--card2);padding:4px 10px;border-radius:10px}

.statusbar{background:var(--card);border-top:1px solid var(--bdr);padding:6px 1.5rem;font-size:11px;color:var(--muted);display:flex;gap:1.5rem;margin-top:auto}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.live{background:var(--grn)}.stopped{background:var(--muted)}

@media(max-width:600px){
  .mc-chord.c1{font-size:56px}
  .mc-chord.c2{font-size:34px}
  .mc-chord.c3{font-size:22px}
  .mc-label{min-width:60px;font-size:9px}
  #ytPlayer{height:180px}
  .offset-wrap{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo"><h1>🎸 Lecteur Basse</h1></div>
  <div class="hdr-r">
    <select class="sel" id="songSelect" onchange="loadSong()">
      <option value="vargas">Vargas Blues Band — Del Sur</option>
    </select>
    <a href="accords.html" class="abtn">📊 Grille</a>
    <a href="theorie.html" class="abtn">🎼 Théorie</a>
    <a href="../guitare.html" class="abtn">🎸</a>
    <a href="../index.html" class="abtn">← Accueil</a>
  </div>
</header>

<!-- YouTube -->
<div id="ytWrap"><div id="ytPlayer"></div></div>

<!-- Titre morceau -->
<div class="song-title">
  <div>
    <div class="song-name" id="songName">—</div>
    <div class="song-meta" id="songMeta">—</div>
  </div>
  <div class="mnum-badge" id="measureBadge">M — / —</div>
</div>

<!-- Controls -->
<div class="ctrl">
  <button class="btn btn-play" id="btnPlay" onclick="togglePlay()">▶ Play</button>
  <button class="btn btn-stop" onclick="stopPlay()">⏹ Stop</button>
  <div class="timer" id="timer">0:00</div>
  <div class="prog-wrap" onclick="seekTo(event)"><div class="prog-bar" id="progBar"></div></div>
  <div class="offset-wrap">
    <button class="offset-btn" onclick="adjustOffset(-0.1)">◀ -0.1s</button>
    <div class="offset-val" id="offsetDisplay">offset: +0.5s</div>
    <button class="offset-btn" onclick="adjustOffset(0.1)">+0.1s ▶</button>
  </div>
</div>

<!-- 3 Accords -->
<div class="chords-zone">
  <div class="mc-row current">
    <div class="mc-label">En cours</div>
    <div class="mc-chord c1" id="chord1">—</div>
    <div class="mc-right">
      <div class="beat-dots" id="beatDots"></div>
    </div>
  </div>
  <div class="mc-row">
    <div class="mc-label" style="color:#f58340">Suivant →</div>
    <div class="mc-chord c2" id="chord2">—</div>
  </div>
  <div class="mc-row">
    <div class="mc-label">Après →→</div>
    <div class="mc-chord c3" id="chord3">—</div>
  </div>
</div>

<div class="statusbar">
  <span><span class="sdot stopped" id="sdot"></span><span id="smode">Arrêté — Play pour démarrer</span></span>
  <span id="sclock"></span>
</div>

let song=null, ytPlayer=null, ytReady=false, isPlaying=false;
let animFrame=null, syncInterval=null, currentMeasureIdx=-1;
let timeOffset = 0.5;
const BEAT_DUR = () => 60/song.bpm;

function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('ytPlayer', {
    height:'220', width:'100%', videoId:'',
    playerVars:{playsinline:1, rel:0, modestbranding:1},
    events:{
      onReady: ()=>{ ytReady=true; if(song) ytPlayer.cueVideoById(song.ytId); },
      onStateChange: e=>{
        if(e.data===YT.PlayerState.ENDED) stopPlay();
        if(e.data===YT.PlayerState.PAUSED && isPlaying) pausePlay();
      }
    }
  });
}

function loadSong() {
  const key = document.getElementById('songSelect').value;
  song = SONGS[key];
  stopPlay();
  buildDots();
  document.getElementById('songName').textContent = song.title;
  document.getElementById('songMeta').textContent = song.meta;
  if(ytReady && ytPlayer) ytPlayer.cueVideoById(song.ytId);
}

function buildDots() {
  const d = document.getElementById('beatDots');
  d.innerHTML = '';
  for(let i=0;i<song.beatsPerMeasure;i++){
    const dot = document.createElement('div');
    dot.className = 'dot'+(i===0?' b1':'');
    dot.id = 'dot_'+i;
    d.appendChild(dot);
  }
}

function adjustOffset(delta) {
  timeOffset = Math.round((timeOffset+delta)*100)/100;
  document.getElementById('offsetDisplay').textContent = `offset: ${timeOffset>=0?'+':''}${timeOffset}s`;
}

function getNextChord(fromIdx, skip=0) {
  let count=0, last=song.beats[fromIdx];
  for(let i=fromIdx+1;i<song.beats.length;i++){
    if(song.beats[i] && song.beats[i]!==last){
      if(count===skip) return song.beats[i];
      count++; last=song.beats[i];
    }
  }
  return '—';
}

function togglePlay() {
  if(!song) loadSong();
  isPlaying ? pausePlay() : startPlay();
}

function startPlay() {
  isPlaying = true;
  document.getElementById('btnPlay').textContent = '⏸ Pause';
  document.getElementById('sdot').className = 'sdot live';
  document.getElementById('smode').textContent = 'Lecture en cours';
  if(ytReady && ytPlayer){
    if(ytPlayer.getPlayerState()!==1){ ytPlayer.seekTo(0); ytPlayer.playVideo(); }
  }
  if(syncInterval) clearInterval(syncInterval);
  syncInterval = setInterval(()=>{
    if(!isPlaying||!ytReady||!ytPlayer) return;
    try{ const t=ytPlayer.getCurrentTime(); if(t>0) updateDisplay(t); }catch(e){}
  }, 2000);
  tick();
}

function pausePlay() {
  isPlaying=false;
  document.getElementById('btnPlay').textContent='▶ Play';
  document.getElementById('smode').textContent='Pause';
  cancelAnimationFrame(animFrame);
  if(syncInterval){clearInterval(syncInterval);syncInterval=null;}
  if(ytReady&&ytPlayer) ytPlayer.pauseVideo();
}

function stopPlay() {
  isPlaying=false;
  document.getElementById('btnPlay').textContent='▶ Play';
  document.getElementById('sdot').className='sdot stopped';
  document.getElementById('smode').textContent='Arrêté — Play pour démarrer';
  cancelAnimationFrame(animFrame);
  if(syncInterval){clearInterval(syncInterval);syncInterval=null;}
  if(ytReady&&ytPlayer) ytPlayer.stopVideo();
  currentMeasureIdx=-1;
  ['chord1','chord2','chord3'].forEach(id=>document.getElementById(id).textContent='—');
  document.getElementById('timer').textContent='0:00';
  document.getElementById('measureBadge').textContent='M — / —';
  document.getElementById('progBar').style.width='0%';
  for(let i=0;i<4;i++){const d=document.getElementById('dot_'+i);if(d)d.classList.remove('on');}
}

function seekTo(e) {
  if(!song) return;
  const rect=e.currentTarget.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  const t=pct*song.beats.length*BEAT_DUR();
  if(ytReady&&ytPlayer) ytPlayer.seekTo(t);
  updateDisplay(t);
}

function updateDisplay(elapsed) {
  if(!song) return;
  elapsed = Math.max(0, elapsed-timeOffset);
  const totalDur = song.beats.length*BEAT_DUR();
  if(elapsed>=totalDur){stopPlay();return;}

  const beatIdx = Math.min(Math.floor(elapsed/BEAT_DUR()), song.beats.length-1);
  const chord = song.beats[beatIdx]||'〜';
  const beatInMeasure = beatIdx%song.beatsPerMeasure;

  // 3 accords
  document.getElementById('chord1').textContent = chord;
  document.getElementById('chord2').textContent = getNextChord(beatIdx,0);
  document.getElementById('chord3').textContent = getNextChord(beatIdx,1);

  // Timer
  const mins=Math.floor(elapsed/60), secs=Math.floor(elapsed%60).toString().padStart(2,'0');
  document.getElementById('timer').textContent=`${mins}:${secs}`;

  // Progress
  document.getElementById('progBar').style.width=(elapsed/totalDur*100)+'%';

  // Mesure
  let measureIdx=0, cumBeats=0;
  for(let i=0;i<song.measures.length;i++){
    const mb=song.measures[i].beats.length;
    if(beatIdx<cumBeats+mb){measureIdx=i;break;}
    cumBeats+=mb;
  }
  document.getElementById('measureBadge').textContent=`M ${song.measures[measureIdx]?.num||'—'} / ${song.totalMeasures}`;

  // Dots
  for(let i=0;i<song.beatsPerMeasure;i++){
    const d=document.getElementById('dot_'+i);
    if(d) d.classList.toggle('on', i===beatInMeasure);
  }
}

function tick() {
  if(!isPlaying) return;
  if(ytReady&&ytPlayer){
    try{const t=ytPlayer.getCurrentTime();if(t>=0)updateDisplay(t);}catch(e){}
  }
  animFrame=requestAnimationFrame(tick);
}

setInterval(()=>{document.getElementById('sclock').textContent=new Date().toLocaleTimeString('fr-BE');},1000);
loadSong();
</script>
